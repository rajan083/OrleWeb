{% extends "base.html" %}
{% block title %}{{ 'Edit Product' if product else 'Add Product' }}{% endblock %}
{% block content %}
<div class="onboarding">
    <h1>{{ 'Edit product' if product else 'List a new product' }}</h1>

    <form action="{{ url_for('vendor_edit_product', product_id=product.id) if product else url_for('vendor_add_product') }}" method="POST" enctype="multipart/form-data">
        
        <div class="field">
            <label>Name</label>
            <input type="text" name="name" value="{{ product.name if product else '' }}" required>
        </div>
        <div class="field">
            <label>Description</label>
            <input type="text" name="description" value="{{ product.description if product else '' }}">
        </div>
        <div class="field">
            <label>Price (₹)</label>
            <input type="number" name="price" value="{{ product.price if product else '' }}" required>
        </div>
        <div class="field">
            <label>Category</label>
            <input type="text" name="category" value="{{ product.category if product else '' }}" placeholder="suit, blazer, trouser..." required>
        </div>
        <div class="field">
            <label>Product Image</label>

            {% if product and product.image_url %}
                <img
                    src="{{ url_for('static', filename=product.image_url) }}"
                    style="width:150px;border-radius:10px;margin-bottom:12px;">
            {% endif %}

            <input
                type="file"
                name="product_image"
                accept=".jpg,.jpeg,.png,.webp">
        </div>        
        <div class="field">
            <label>Best for body types (comma-separated)</label>
            <input type="text" name="best_for_body_types" value="{{ product.best_for_body_types if product else '' }}">
        </div>
        <div class="field">
            <label>Best for occasions (comma-separated)</label>
            <input type="text" name="best_for_occasions" value="{{ product.best_for_occasions if product else '' }}">
        </div>
        <div class="field">
            <label>Fit note</label>
            <input type="text" name="fit_note" value="{{ product.fit_note if product else '' }}">
        </div>
        <button type="submit" class="btn-save">{{ 'Save changes' if product else 'List product' }}</button>
    </form>
</div>
{% endblock %}
