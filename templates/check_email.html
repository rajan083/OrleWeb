{% extends "base.html" %}

{% block title %}Check your email{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <h1>Check your inbox</h1>
        <p class="onboarding-sub">We've sent a verification link to <strong>{{ email }}</strong>. Click it to activate your account.</p>
        <a href="{{ url_for('login') }}"><button class="btn-save">Back to sign in</button></a>
    </div>
</div>
{% endblock %}
