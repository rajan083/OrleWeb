{% extends "base.html" %}
{% block title %}Vendor Sign In{% endblock %}
{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <p>New vendor? <a href="{{ url_for('vendor_register') }}">Register your business</a></p>
        <form action="{{ url_for('vendor_login') }}" method="POST">
            <input type="email" name="email" placeholder="business@email.com" required>
            <input type="password" name="password" placeholder="••••••••••" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
