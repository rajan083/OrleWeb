{% extends "base.html" %}

{% block title %}Email verification{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        {% if success %}
            <h1>Verified</h1>
        {% else %}
            <h1>Verification failed</h1>
        {% endif %}
        <p class="onboarding-sub">{{ message }}</p>
        <a href="{{ url_for('login') }}"><button class="btn-save">Go to sign in</button></a>
    </div>
</div>
{% endblock %}
