{% extends "base.html" %}

{% block title %}SIGN IN-ORLE{% endblock %}

{% block content %}

<div class="form-wrapper">
    <div class="form-card">
        <p>NEW HERE? <a href="{{ url_for('register') }}">SIGN UP</a></p>

        {% if error %}
            <p class="form-error">{{ error }}</p>
        {% endif %}

        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="name@domain.com" id="Email" required autocomplete="email">
            <input type="password" name="password" placeholder="•••••••••" id="Password" required>
            <div class="form-links">
                <a href="{{ url_for('forgot_password') }}">FORGOT PASSWORD</a>
                <a href="{{url_for('login_google')}}">SIGN IN GOOGLE</a>
            </div>
            <button type="submit">SUBMIT</button>
        </form>
    </div>
</div>

{% endblock %}
